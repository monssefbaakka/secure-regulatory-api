name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:

env:
  ALLOWED_API_KEYS: '["${{ secrets.API_KEY_1 }}","${{ secrets.API_KEY_2 }}"]'

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install linters
        run: pip install black flake8

      - name: Run linters
        run: |
          black --check .
          flake8 app tests

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=html --cov-fail-under=85

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  sast:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: bandit -r app -lll

  sca:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install pip-audit
        run: pip install pip-audit==2.7.3

      - name: Run pip-audit
        run: pip-audit

  docker_build_push:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [test, sast, sca]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull latest image for cache
        run: docker pull myorg/secure-regulatory-api:latest || true

      - name: Build Docker image
        run: |
          docker buildx build \
            --load \
            --cache-from type=registry,ref=myorg/secure-regulatory-api:latest \
            --tag myorg/secure-regulatory-api:${{ github.sha }} \
            --tag myorg/secure-regulatory-api:latest \
            -f Dockerfile .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: myorg/secure-regulatory-api:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH

      - name: Push image
        run: |
          docker push myorg/secure-regulatory-api:${{ github.sha }}
          docker push myorg/secure-regulatory-api:latest