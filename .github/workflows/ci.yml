name: DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  ALLOWED_API_KEYS: '["${{ secrets.API_KEY_1 }}","${{ secrets.API_KEY_2 }}"]'

jobs:

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install linters
        run: pip install black flake8

      - name: Run linters
        run: |
          black --check .
          flake8 app tests

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest-cov

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=html --cov-fail-under=85

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov/

  sast:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Bandit
        run: pip install bandit

      - name: Run Bandit
        run: bandit -r app -lll

  sca:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install pip-audit
        run: pip install pip-audit==2.7.3

      - name: Run pip-audit
        run: pip-audit

  test_backup:
    runs-on: ubuntu-latest
    needs: test
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpassword
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t backup-container .

      - name: Write some data to this database
        env:
          PGPASSWORD: testpassword
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client
          psql -h localhost -U testuser -d testdb -c "CREATE TABLE mydata (id SERIAL PRIMARY KEY, info TEXT);"
          psql -h localhost -U testuser -d testdb -c "INSERT INTO mydata (info) VALUES ('backup_test_123');"

      - name: Use local config for rclone not to run any additional storages
        run: |
          mkdir -p ~/.config/rclone
          echo "[local_storage]" > ~/.config/rclone/rclone.conf
          echo "type = local" >> ~/.config/rclone/rclone.conf

      - name: Create a backup using the container
        run: |
          mkdir -p ./backup_dst
          docker run --rm --network host \
            -v ~/.config/rclone:/root/.config/rclone \
            -v ${{ github.workspace }}/backup_dst:/backup_dst \
            -e DB_HOST=localhost \
            -e DB_PORT=5432 \
            -e DB_USER=testuser \
            -e DB_PASSWORD=testpassword \
            -e DB_NAME=testdb \
            -e RCLONE_DEST=local_storage:/backup_dst \
            backup-container backup

      - name: Remove the database and run a new one
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U testuser -d postgres -c "DROP DATABASE testdb;"
          psql -h localhost -U testuser -d postgres -c "CREATE DATABASE testdb;"

      - name: Restore the backup
        run: |
          docker run --rm --network host \
            -v ~/.config/rclone:/root/.config/rclone \
            -v ${{ github.workspace }}/backup_dst:/backup_dst \
            -e DB_HOST=localhost \
            -e DB_PORT=5432 \
            -e DB_USER=testuser \
            -e DB_PASSWORD=testpassword \
            -e DB_NAME=testdb \
            -e RCLONE_DEST=local_storage:/backup_dst \
            backup-container restore

      - name: Check the data
        env:
          PGPASSWORD: testpassword
        run: |
          RESULT=$(psql -h localhost -U testuser -d testdb -t -c "SELECT info FROM mydata LIMIT 1;" | xargs)
          if [ "$RESULT" != "backup_test_123" ]; then
            echo "Data check failed! Expected 'backup_test_123', got '$RESULT'"
            exit 1
          fi
          echo "Data check passed!"

  docker_build_push:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [test, sast, sca, test_backup]
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Pull latest image for cache
        run: docker pull lidiafcarvalho/secure-regulatory-api:latest || true

      - name: Build Docker image
        run: |
          docker buildx build \
            --load \
            --cache-from type=registry,ref=lidiafcarvalho/secure-regulatory-api:latest \
            --tag lidiafcarvalho/secure-regulatory-api:${{ github.sha }} \
            --tag lidiafcarvalho/secure-regulatory-api:latest \
            -f Dockerfile .

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@0.20.0
        with:
          image-ref: lidiafcarvalho/secure-regulatory-api:${{ github.sha }}
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          vuln-type: os

      - name: Push image
        run: |
          docker push lidiafcarvalho/secure-regulatory-api:${{ github.sha }}
          docker push lidiafcarvalho/secure-regulatory-api:latest